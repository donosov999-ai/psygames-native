# РУЧНОЙ инструмент передеплоя произвольного билда в Google Play.
# Автодеплой на тегах живёт job'ом google-play ВНУТРИ build.yml (same-run):
# прежний workflow_run-триггер здесь на тег-пушах не срабатывал вовсе (v1.146).
name: Deploy Android to Google Play (manual)

on:
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Build run ID (from Actions tab)'
        required: true
      version_name:
        description: 'Version name (e.g. v1.145.0)'
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (for deploy script)
        uses: actions/checkout@v4

      - name: Download AAB from build run
        uses: actions/download-artifact@v4
        with:
          name: PsyGames-android-aab
          path: ./aab
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ inputs.run_id }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install googleapis
        run: npm install googleapis

      - name: Upload to Google Play (internal + alpha + closed-test1)
        env:
          GOOGLE_PLAY_SA_JSON: ${{ secrets.GOOGLE_PLAY_SA_JSON }}
          AAB_PATH: ./aab/PsyGames-android.aab
          VERSION_NAME: ${{ inputs.version_name }}
        run: node .github/scripts/deploy_play.js
