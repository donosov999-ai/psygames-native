name: Build native bundles (macOS arm + Windows + Android)

on:
  push:
    branches: [main]
    tags:    ['v*']
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  NODE_VERSION: '22'
  RUST_VERSION: 'stable'

jobs:
  # ─── macOS Apple Silicon ──────────────────────────────────────────────
  macos-arm:
    name: macOS arm64 (.app)
    runs-on: macos-latest  # github-hosted M-runner, native arm64
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-arm-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked --force

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web for Tauri (baseUrl="")
        working-directory: frontend
        run: |
          cp app.json app.json.bak
          sed -i '' 's|"baseUrl": "/psygames-web"|"baseUrl": ""|' app.json
          npx expo export -p web
          mv app.json.bak app.json

      - name: Move dist into src-tauri
        run: |
          rm -rf src-tauri/dist
          mv frontend/dist src-tauri/dist

      - name: Clean stale bundle (mac, cached target)
        working-directory: src-tauri
        run: rm -rf target/aarch64-apple-darwin/release/bundle

      - name: Build .app (arm64)
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Package .app → tar.gz
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          tar -czf PsyGames-macos-arm64.tar.gz PsyGames.app
          ls -la PsyGames-macos-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-macos-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/PsyGames-macos-arm64.tar.gz
          retention-days: 30

      # v1.17.0: Tauri updater artifacts (подписанный .app.tar.gz + .sig)
      - name: Upload macOS updater artifact
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-macos-updater
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/PsyGames.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/PsyGames.app.tar.gz.sig
          retention-days: 30
        continue-on-error: true

  # ─── Windows x86_64 ────────────────────────────────────────────────────
  windows-x64:
    name: Windows x86_64 (.exe)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-win-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked --force

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web for Tauri (baseUrl="")
        working-directory: frontend
        shell: bash
        run: |
          cp app.json app.json.bak
          sed -i 's|"baseUrl": "/psygames-web"|"baseUrl": ""|' app.json
          npx expo export -p web
          mv app.json.bak app.json

      - name: Move dist into src-tauri
        shell: bash
        run: |
          rm -rf src-tauri/dist
          mv frontend/dist src-tauri/dist

      - name: Clean stale bundle (win, cached target)
        working-directory: src-tauri
        shell: bash
        run: rm -rf target/x86_64-pc-windows-msvc/release/bundle

      - name: Build .exe + .msi
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-windows-x64-exe
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-windows-x64-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 30
        continue-on-error: true

      # v1.17.0: Tauri updater signature для NSIS -setup.exe
      - name: Upload Windows updater .sig
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-windows-updater-sig
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
          retention-days: 30
        continue-on-error: true

  # ─── Android (signed APK) ──────────────────────────────────────────────
  android:
    name: Android (signed .apk)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked --force

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web for Tauri (baseUrl="")
        working-directory: frontend
        run: |
          cp app.json app.json.bak
          sed -i 's|"baseUrl": "/psygames-web"|"baseUrl": ""|' app.json
          npx expo export -p web
          mv app.json.bak app.json

      - name: Move dist into src-tauri
        run: |
          rm -rf src-tauri/dist
          mv frontend/dist src-tauri/dist

      - name: Decode signing keystore
        run: |
          mkdir -p src-tauri/keys
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/keys/psygames-release.jks
          ls -la src-tauri/keys/

      - name: Initialize Tauri Android project
        working-directory: src-tauri
        run: cargo tauri android init

      - name: Patch build.gradle.kts with signing config
        working-directory: src-tauri
        run: |
          GRADLE=gen/android/app/build.gradle.kts
          if [ ! -f "$GRADLE" ]; then
            echo "ERROR: $GRADLE not found after android init"
            find gen/android -name "build.gradle*" -type f
            exit 1
          fi
          # Use absolute path from env var (avoids fragile relative resolution).
          cat >> "$GRADLE" <<'EOF'

          android {
              signingConfigs {
                  create("release") {
                      storeFile = file(System.getenv("ANDROID_KEYSTORE_PATH"))
                      storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias = System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword = System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          EOF
          tail -25 "$GRADLE"

      - name: Build signed APK
        working-directory: src-tauri
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/src-tauri/keys/psygames-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "Using keystore at: $ANDROID_KEYSTORE_PATH"
          ls -la "$ANDROID_KEYSTORE_PATH"
          cargo tauri android build --apk

      - name: Locate APK
        working-directory: src-tauri
        run: |
          echo "--- searching for APK ---"
          find gen/android -name "*.apk" -type f
          mkdir -p out
          find gen/android -name "*release*.apk" -type f -exec cp {} out/PsyGames-android.apk \;
          ls -la out/

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-android-apk
          path: src-tauri/out/PsyGames-android.apk
          retention-days: 30

  # ─── Web deploy → psygames-web GH Pages repo ──────────────────────────
  # Builds the web bundle WITH baseUrl="/psygames-web" and pushes the
  # contents of dist/ into donosov999-ai/psygames-web (main branch).
  # GH Pages picks it up automatically. Same source = same content across
  # web + native builds.
  web-deploy:
    name: Web → psygames-web GH Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [macos-arm]   # gate on at least one platform build succeeding
    if: github.ref == 'refs/heads/main'  # only main branch deploys
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web (with /psygames-web baseUrl)
        working-directory: frontend
        run: |
          # app.json already has baseUrl=/psygames-web in committed state
          grep baseUrl app.json
          npx expo export -p web
          ls -la dist/

      - name: Checkout psygames-web target repo
        uses: actions/checkout@v6
        with:
          repository: donosov999-ai/psygames-web
          token: ${{ secrets.PSYGAMES_WEB_DEPLOY_TOKEN }}
          path: psygames-web-target

      - name: Sync dist → psygames-web (preserve .git, .nojekyll, README, download.html, profiles.html)
        run: |
          cd psygames-web-target
          # Preserve git metadata + GH-Pages flag + README + landing pages
          find . -maxdepth 1 ! -name '.git' ! -name '.nojekyll' ! -name 'README.md' ! -name 'download.html' ! -name 'profiles.html' ! -name '.' -exec rm -rf {} +
          cp -R ../frontend/dist/* .
          # Re-add .nojekyll in case it was missing
          touch .nojekyll
          echo "--- new state ---"
          ls -la | head -20

      - name: Commit + push to psygames-web
        working-directory: psygames-web-target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — psygames-web already up to date"
            exit 0
          fi
          git commit -m "Auto-deploy from psygames-native@${{ github.sha }} (run ${{ github.run_id }}, event ${{ github.event_name }})"
          git push

  # ─── Create GitHub Release if tagged (vX.Y.Z) ─────────────────────────
  release:
    needs: [macos-arm, windows-x64, android]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
      - name: Show artifacts
        run: find artifacts -type f

      # v1.17.0: собрать latest.json для Tauri-updater (desktop: mac arm64 + win x64).
      # .sig — содержимое подписи Tauri-updater (single-line base64). URL'ы ведут
      # на ассеты ЭТОГО релиза; endpoint в приложении — releases/latest/download/latest.json.
      - name: Generate latest.json (Tauri updater manifest)
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          BASE="https://github.com/donosov999-ai/psygames-native/releases/download/${TAG}"
          MAC_SIG_FILE="artifacts/PsyGames-macos-updater/PsyGames.app.tar.gz.sig"
          # версионные имена — НЕ head -1: кэш CI может оставить .exe прошлой версии
          WIN_EXE="PsyGames_${VER}_x64-setup.exe"
          WIN_EXE_PATH="artifacts/PsyGames-windows-x64-exe/${WIN_EXE}"
          WIN_SIG_FILE="artifacts/PsyGames-windows-updater-sig/${WIN_EXE}.sig"
          PLATFORMS=""
          if [ -f "$MAC_SIG_FILE" ]; then
            MAC_SIG=$(tr -d '\n\r' < "$MAC_SIG_FILE")
            PLATFORMS="\"darwin-aarch64\":{\"signature\":\"${MAC_SIG}\",\"url\":\"${BASE}/PsyGames.app.tar.gz\"}"
          else
            echo "WARN: mac updater .sig not found — darwin omitted from latest.json"
          fi
          if [ -f "$WIN_SIG_FILE" ] && [ -f "$WIN_EXE_PATH" ]; then
            WIN_SIG=$(tr -d '\n\r' < "$WIN_SIG_FILE")
            [ -n "$PLATFORMS" ] && PLATFORMS="${PLATFORMS},"
            PLATFORMS="${PLATFORMS}\"windows-x86_64\":{\"signature\":\"${WIN_SIG}\",\"url\":\"${BASE}/${WIN_EXE}\"}"
          else
            echo "WARN: win updater .sig/.exe not found — windows omitted from latest.json"
          fi
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{\n  "version": "%s",\n  "pub_date": "%s",\n  "platforms": {%s}\n}\n' "$VER" "$PUB_DATE" "$PLATFORMS" > latest.json
          echo "--- latest.json ---"
          cat latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/PsyGames-macos-arm64/PsyGames-macos-arm64.tar.gz
            artifacts/PsyGames-macos-updater/PsyGames.app.tar.gz
            artifacts/PsyGames-windows-x64-exe/*.exe
            artifacts/PsyGames-windows-x64-msi/*.msi
            artifacts/PsyGames-android-apk/PsyGames-android.apk
            latest.json
          generate_release_notes: true

      # Sync release binaries → Contabo psy-games.pro/downloads/ под СТАБИЛЬНЫМИ
      # именами (кнопки на download/ постоянны). continue-on-error: GitHub Release —
      # источник истины; если Contabo SFTP флапнул — фолбэк ./deploy-downloads.sh.
      - name: Sync binaries to Contabo /downloads
        continue-on-error: true
        env:
          CONTABO_SSH_HOST: ${{ secrets.CONTABO_SSH_HOST }}
          CONTABO_SSH_USER: ${{ secrets.CONTABO_SSH_USER }}
          CONTABO_SSH_PASS: ${{ secrets.CONTABO_SSH_PASS }}
          CONTABO_REMOTE_DIR: ${{ secrets.CONTABO_REMOTE_DIR }}
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          mkdir -p dl
          cp artifacts/PsyGames-macos-arm64/PsyGames-macos-arm64.tar.gz dl/
          cp artifacts/PsyGames-android-apk/PsyGames-android.apk dl/
          cp artifacts/PsyGames-windows-x64-exe/*-setup.exe dl/PsyGames-windows-x64-setup.exe
          cp artifacts/PsyGames-windows-x64-msi/*.msi dl/PsyGames-windows-x64.msi || true
          echo "--- uploading to /downloads ---"; ls -lh dl/
          lftp -u "$CONTABO_SSH_USER","$CONTABO_SSH_PASS" "sftp://$CONTABO_SSH_HOST" -e "
            set sftp:auto-confirm yes; set net:timeout 60; set net:max-retries 3; set net:connection-limit 1;
            mkdir -f $CONTABO_REMOTE_DIR/downloads;
            mirror -R --no-perms dl/ $CONTABO_REMOTE_DIR/downloads/;
            bye"
          echo "✓ synced → https://psy-games.pro/downloads/"
