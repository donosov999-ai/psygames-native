name: Build native bundles (macOS arm + Windows + Android)

on:
  push:
    branches: [main]
    tags:    ['v*']
    paths-ignore:
      - '.github/**'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  # Cargo network hardening — крейты с crates.io иногда падают на
  # "curl [16] HTTP2 framing layer" (флейки HTTP/2). Отключаем мультиплексинг
  # (→ HTTP/1.1) + ретраи. Глобально: macOS/Windows/Android все дёргают cargo.
  CARGO_NET_RETRY: "10"
  CARGO_HTTP_MULTIPLEXING: "false"
  CARGO_NET_GIT_FETCH_WITH_CLI: "true"
  NODE_VERSION: '22'
  RUST_VERSION: 'stable'

jobs:
  # ─── TypeScript gate ──────────────────────────────────────────────────
  # Падает при любой ошибке tsc → блокирует web-deploy и release (ничего не публикуется).
  typecheck:
    name: TypeScript (tsc --noEmit)
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Typecheck (gate)
        working-directory: frontend
        run: npx tsc --noEmit

      # v1.110.0: unit-тесты чистых функций (tokens/comboBonus/SRS/daily-challenge).
      # Падение теста блокирует web-deploy и release так же, как tsc.
      - name: Unit tests (gate)
        working-directory: frontend
        run: npm test -- --ci

  # ─── Smoke games — ловит mount-краши/ошибки консоли ──────────────────
  # v1.110.0: теперь БЛОКИРУЕТ release (по клику Дениса в аудите 2026-07-04).
  # Только на тегах (на релизах, когда важно), чтобы не жечь минуты на каждый main.
  smoke:
    name: Smoke games (gate on tags)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: Build web (baseUrl="")
        working-directory: frontend
        run: |
          cp app.json app.json.bak
          sed -i 's|"baseUrl": "/psygames-web"|"baseUrl": ""|' app.json
          npx expo export -p web
          mv app.json.bak app.json
      - name: Install Playwright chromium
        working-directory: frontend
        run: |
          npm i -D playwright --legacy-peer-deps
          npx playwright install --with-deps chromium
      - name: Serve dist + run smoke
        working-directory: frontend
        run: |
          npx serve dist -l 8081 >/tmp/serve.log 2>&1 &
          for i in $(seq 1 30); do curl -sf http://localhost:8081 >/dev/null 2>&1 && break; sleep 2; done
          BASE=http://localhost:8081 GAMES_DIR=./app/games node scripts/smoke-games.mjs

  # ─── macOS Apple Silicon ──────────────────────────────────────────────
  macos-arm:
    name: macOS arm64 (.app)
    runs-on: macos-latest  # github-hosted M-runner, native arm64
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Cache Cargo target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-arm-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked --force

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web for Tauri (baseUrl="")
        working-directory: frontend
        run: |
          cp app.json app.json.bak
          sed -i '' 's|"baseUrl": "/psygames-web"|"baseUrl": ""|' app.json
          npx expo export -p web
          mv app.json.bak app.json

      - name: Move dist into src-tauri
        run: |
          rm -rf src-tauri/dist
          mv frontend/dist src-tauri/dist

      - name: Clean stale bundle (mac, cached target)
        working-directory: src-tauri
        run: rm -rf target/aarch64-apple-darwin/release/bundle

      - name: Build .app (arm64)
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build --target aarch64-apple-darwin

      - name: Package .app → tar.gz
        run: |
          cd src-tauri/target/aarch64-apple-darwin/release/bundle/macos
          tar -czf PsyGames-macos-arm64.tar.gz PsyGames.app
          ls -la PsyGames-macos-arm64.tar.gz

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-macos-arm64
          path: src-tauri/target/aarch64-apple-darwin/release/bundle/macos/PsyGames-macos-arm64.tar.gz
          retention-days: 30

      # v1.17.0: Tauri updater artifacts (подписанный .app.tar.gz + .sig)
      - name: Upload macOS updater artifact
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-macos-updater
          path: |
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/PsyGames.app.tar.gz
            src-tauri/target/aarch64-apple-darwin/release/bundle/macos/PsyGames.app.tar.gz.sig
          retention-days: 30
        continue-on-error: true

  # ─── Windows x86_64 ────────────────────────────────────────────────────
  windows-x64:
    name: Windows x86_64 (.exe)
    runs-on: windows-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Cargo target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-win-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked --force

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web for Tauri (baseUrl="")
        working-directory: frontend
        shell: bash
        run: |
          cp app.json app.json.bak
          sed -i 's|"baseUrl": "/psygames-web"|"baseUrl": ""|' app.json
          npx expo export -p web
          mv app.json.bak app.json

      - name: Move dist into src-tauri
        shell: bash
        run: |
          rm -rf src-tauri/dist
          mv frontend/dist src-tauri/dist

      - name: Clean stale bundle (win, cached target)
        working-directory: src-tauri
        shell: bash
        run: rm -rf target/x86_64-pc-windows-msvc/release/bundle

      - name: Build .exe + .msi
        working-directory: src-tauri
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ""
        run: cargo tauri build --target x86_64-pc-windows-msvc

      - name: Upload .exe artifact
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-windows-x64-exe
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Upload .msi artifact
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-windows-x64-msi
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/msi/*.msi
          retention-days: 30
        continue-on-error: true

      # v1.17.0: Tauri updater signature для NSIS -setup.exe
      - name: Upload Windows updater .sig
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-windows-updater-sig
          path: src-tauri/target/x86_64-pc-windows-msvc/release/bundle/nsis/*.sig
          retention-days: 30
        continue-on-error: true

  # ─── Android (signed APK + AAB) ───────────────────────────────────────
  android:
    name: Android (signed .apk + .aab)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      ANDROID_HOME: /usr/local/lib/android/sdk
      NDK_HOME: /usr/local/lib/android/sdk/ndk/27.0.12077973
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Setup Java 17
        uses: actions/setup-java@v5
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v4
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.0.12077973'

      - name: Setup Rust + Android targets
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android,armv7-linux-androideabi,i686-linux-android,x86_64-linux-android

      - name: Cache Cargo target
        uses: actions/cache@v5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            src-tauri/target/
          key: ${{ runner.os }}-android-cargo-${{ hashFiles('src-tauri/Cargo.toml') }}

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2.0" --locked --force

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web for Tauri (baseUrl="")
        working-directory: frontend
        run: |
          cp app.json app.json.bak
          sed -i 's|"baseUrl": "/psygames-web"|"baseUrl": ""|' app.json
          npx expo export -p web
          mv app.json.bak app.json

      - name: Move dist into src-tauri
        run: |
          rm -rf src-tauri/dist
          mv frontend/dist src-tauri/dist

      - name: Decode signing keystore
        run: |
          mkdir -p src-tauri/keys
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > src-tauri/keys/psygames-release.jks
          ls -la src-tauri/keys/

      - name: Initialize Tauri Android project
        working-directory: src-tauri
        run: cargo tauri android init

      - name: Respect system auto-rotate (Android manifest) — fullUser
        working-directory: src-tauri
        run: |
          # ЗАЧЕМ fullUser, а НЕ sensor.
          # `sensor` крутит активити по датчику ДАЖЕ КОГДА пользователь выключил
          # автоповорот в настройках телефона — приложение переворачивалось само
          # вопреки системной настройке (репорт тестировщика: «экран переворачивается
          # сам, автоповорот отключён»), а потом OrientationGuard ещё и требовал
          # повернуть обратно. Замкнутый круг раздражения.
          # `fullUser` = поворот отдан системе: автоповорот ВЫКЛ → активити не крутится
          # вообще; автоповорот ВКЛ → доступны все ориентации, значит landscape-раскладка
          # судоку (сетка слева, цифры справа) по-прежнему достижима.
          MANIFEST=gen/android/app/src/main/AndroidManifest.xml
          if [ -f "$MANIFEST" ]; then
            sed -i 's#android:name=".MainActivity"#android:name=".MainActivity" android:screenOrientation="fullUser"#' "$MANIFEST"
            echo "— rotation (fullUser) applied —"; grep -n "screenOrientation\|MainActivity" "$MANIFEST" || true
          else
            echo "WARN: $MANIFEST не найден — пропускаю (OrientationGuard в webview покрывает)"; find gen/android -name AndroidManifest.xml -type f || true
          fi

      - name: Safe-area — паддинг под системную навигацию (MainActivity)
        working-directory: src-tauri
        run: |
          # ЗАЧЕМ: на edge-to-edge Android (принудителен с targetSdk 35+) WebView
          # рисуется ПОД системной навигацией — нижние кнопки игр перекрывались
          # (репорт Вали: «кнопка "играть" не видна на Самсунге»). CSS
          # env(safe-area-inset-bottom) в Android WebView всегда 0, поэтому чиним
          # на нативном слое: инсет-листенер даёт контенту паддинг ровно в высоту
          # навигации (кнопочная ~48dp, жестовая ~0-15dp) на любом устройстве.
          # Вариант «B» из ROADMAP — переживёт Android 16 (opt-out атрибут — нет).
          MAIN=$(find gen/android -name MainActivity.kt | head -1)
          if [ -z "$MAIN" ]; then echo "ERROR: MainActivity.kt not found"; exit 1; fi
          python3 - "$MAIN" <<'PYEOF'
          import sys, re
          p = sys.argv[1]
          s = open(p).read()
          if 'setOnApplyWindowInsetsListener' in s:
              print('insets listener already present'); sys.exit(0)
          # Платформенный API (без androidx) — ноль внешних зависимостей.
          if 'import android.os.Bundle' not in s:
              s = re.sub(r'^(package [^\n]+\n)', r'\1\nimport android.os.Bundle\n', s, count=1)
          listener = (
              '\n    // PsyGames: паддинг под системную навигацию (edge-to-edge, targetSdk 35+)\n'
              '    window.decorView.setOnApplyWindowInsetsListener { _, insets ->\n'
              '      val bottom = if (android.os.Build.VERSION.SDK_INT >= 30)\n'
              '          insets.getInsets(android.view.WindowInsets.Type.navigationBars()).bottom\n'
              '        else @Suppress("DEPRECATION") insets.systemWindowInsetBottom\n'
              '      findViewById<android.view.View>(android.R.id.content)?.setPadding(0, 0, 0, bottom)\n'
              '      insets\n'
              '    }\n'
          )
          if 'super.onCreate(' in s:
              # onCreate уже есть (шаблон tauri) — вставляем ПОСЛЕ super.onCreate(...)
              s = re.sub(r'(super\.onCreate\([^\)]*\)\s*\n)', r'\1' + listener, s, count=1)
          else:
              method = (
                  '  override fun onCreate(savedInstanceState: Bundle?) {\n'
                  '    super.onCreate(savedInstanceState)\n'
                  + listener +
                  '  }\n'
              )
              if re.search(r'class MainActivity[^\{]*\{', s):
                  i = s.rfind('}')
                  s = s[:i] + method + s[i:]
              else:
                  s = re.sub(r'(class MainActivity[^\n]*)\n', r'\1 {\n' + method + '}\n', s, count=1)
          if 'setOnApplyWindowInsetsListener' not in s:
              print('ERROR: patch failed to apply'); sys.exit(1)
          open(p, 'w').write(s)
          print('MainActivity patched with navigation-bar inset padding')
          PYEOF
          echo '--- MainActivity.kt after patch ---'
          cat "$MAIN"

      - name: Patch build.gradle.kts with signing config
        working-directory: src-tauri
        run: |
          GRADLE=gen/android/app/build.gradle.kts
          if [ ! -f "$GRADLE" ]; then
            echo "ERROR: $GRADLE not found after android init"
            find gen/android -name "build.gradle*" -type f
            exit 1
          fi
          # Use absolute path from env var (avoids fragile relative resolution).
          cat >> "$GRADLE" <<'EOF'

          android {
              signingConfigs {
                  create("release") {
                      storeFile = file(System.getenv("ANDROID_KEYSTORE_PATH"))
                      storePassword = System.getenv("ANDROID_KEYSTORE_PASSWORD")
                      keyAlias = System.getenv("ANDROID_KEY_ALIAS")
                      keyPassword = System.getenv("ANDROID_KEY_PASSWORD")
                  }
              }
              buildTypes {
                  getByName("release") {
                      signingConfig = signingConfigs.getByName("release")
                  }
              }
          }
          EOF
          tail -25 "$GRADLE"

      - name: Build signed APK (Tauri)
        working-directory: src-tauri
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/src-tauri/keys/psygames-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "Using keystore at: $ANDROID_KEYSTORE_PATH"
          ls -la "$ANDROID_KEYSTORE_PATH"
          # --aab вместе с --apk: отдельный ./gradlew bundleRelease НЕ работает —
          # gradle-таск rustBuild*Release требует живого tauri CLI (WebSocket IPC),
          # он есть только внутри cargo tauri android build (падение v1.120.3).
          cargo tauri android build --apk --aab

      - name: Locate APK + AAB
        working-directory: src-tauri
        run: |
          echo "--- APK ---"
          find gen/android -name "*release*.apk" -type f
          echo "--- AAB ---"
          find gen/android -name "*.aab" -type f
          mkdir -p out
          find gen/android -name "*release*.apk" -type f -exec cp {} out/PsyGames-android.apk \;
          find gen/android -name "*release*.aab" -type f -exec cp {} out/PsyGames-android.aab \;
          ls -la out/

      - name: ГЕЙТ — нативные .so выровнены на 16 КБ (Google Play, Android 15+)
        working-directory: src-tauri
        run: |
          # Проверяем ИМЕННО те .so, что уедут в стор (из готового APK).
          # LOAD-сегменты должны быть выровнены на 2**14 (0x4000 = 16 КБ), иначе
          # на устройствах с 16 КБ страницами приложение не запустится, а Google
          # Play блокирует прод. Ловим ЗДЕСЬ, а не постфактум в консоли разработчика.
          OBJDUMP=$(find "$ANDROID_HOME/ndk" -name llvm-objdump -path '*linux-x86_64*' | head -1)
          echo "objdump: $OBJDUMP"
          rm -rf so_gate && mkdir so_gate && cd so_gate
          unzip -q ../out/PsyGames-android.apk 'lib/*' -d x
          bad=0; n=0
          while IFS= read -r so; do
            n=$((n+1))
            # у llvm-objdump -p строки LOAD оканчиваются на "align 2**N"; нужно 2**14
            aligns=$("$OBJDUMP" -p "$so" | awk '/LOAD/{print $NF}' | sort -u | tr '\n' ' ')
            if echo "$aligns" | grep -qvw '2\*\*14'; then
              echo "✗ $so — LOAD align: $aligns (нужно 2**14)"; bad=1
            else
              echo "✓ $(basename $(dirname "$so"))/$(basename "$so") — 16 КБ (2**14)"
            fi
          done < <(find x/lib -name '*.so')
          echo "проверено .so: $n"
          [ "$n" -ge 4 ] || { echo "БЛОКЕР: ожидалось ≥4 .so, найдено $n"; exit 1; }
          [ "$bad" = 0 ] || { echo "БЛОКЕР: .so не выровнены на 16 КБ — Android 15+ упадёт"; exit 1; }

      # Tauri подписывает APK, но AAB из --aab выходит БЕЗ jar-подписи
      # (проверено на артефакте: нет корневого META-INF/*.RSA) — Play такой
      # не примет. Подписываем upload-ключом явно + verify как гейт.
      - name: Sign AAB (jarsigner) + verify
        working-directory: src-tauri
        env:
          ANDROID_KEYSTORE_PATH: ${{ github.workspace }}/src-tauri/keys/psygames-release.jks
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          jarsigner -keystore "$ANDROID_KEYSTORE_PATH" \
            -storepass "$ANDROID_KEYSTORE_PASSWORD" -keypass "$ANDROID_KEY_PASSWORD" \
            -sigalg SHA256withRSA -digestalg SHA-256 \
            out/PsyGames-android.aab "$ANDROID_KEY_ALIAS"
          # БЕЗ -strict: android upload-ключ всегда self-signed, -strict на этом
          # валится (exit 4, «with signer errors») — ложная тревога (падение v1.120.4).
          # Гейт: подпись существует и верифицируется.
          verify_out=$(jarsigner -verify out/PsyGames-android.aab)
          echo "$verify_out"
          echo "$verify_out" | grep -q "jar verified" || { echo "✗ AAB is NOT signed"; exit 1; }
          echo "✓ AAB signed & verified (self-signed upload key — норма для Play)"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-android-apk
          path: src-tauri/out/PsyGames-android.apk
          retention-days: 30

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v7
        with:
          name: PsyGames-android-aab
          path: src-tauri/out/PsyGames-android.aab
          retention-days: 30

  # ─── Web deploy → psygames-web GH Pages repo ──────────────────────────
  # Builds the web bundle WITH baseUrl="/psygames-web" and pushes the
  # contents of dist/ into donosov999-ai/psygames-web (main branch).
  # GH Pages picks it up automatically. Same source = same content across
  # web + native builds.
  web-deploy:
    name: Web → psygames-web GH Pages
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [macos-arm, typecheck]   # gate on a platform build + tsc passing
    if: github.ref == 'refs/heads/main'  # only main branch deploys
    steps:
      - uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Build web (with /psygames-web baseUrl) — WEB-DEMO
        working-directory: frontend
        env:
          # Решение Дениса (07.2026): публичный web = ТОЛЬКО ДЕМО (лендинг + демо-раунды,
          # прогресс не пишется, CTA «Скачать приложение»). Флаг инлайнится babel'ем при
          # экспорте (src/services/buildTarget.ts). Tauri-джобы экспортят БЕЗ флага
          # (свой export в каждой джобе) = полное приложение.
          EXPO_PUBLIC_BUILD_TARGET: web-demo
        run: |
          # app.json already has baseUrl=/psygames-web in committed state
          grep baseUrl app.json
          npx expo export -p web
          ls -la dist/

      - name: Checkout psygames-web target repo
        uses: actions/checkout@v6
        with:
          repository: donosov999-ai/psygames-web
          token: ${{ secrets.PSYGAMES_WEB_DEPLOY_TOKEN }}
          path: psygames-web-target

      - name: Sync dist → psygames-web (preserve .git, .nojekyll, README, download.html, profiles.html)
        run: |
          cd psygames-web-target
          # Preserve git metadata + GH-Pages flag + README + landing pages
          find . -maxdepth 1 ! -name '.git' ! -name '.nojekyll' ! -name 'README.md' ! -name 'download.html' ! -name 'profiles.html' ! -name '.' -exec rm -rf {} +
          cp -R ../frontend/dist/* .
          # Re-add .nojekyll in case it was missing
          touch .nojekyll
          echo "--- new state ---"
          ls -la | head -20

      - name: Commit + push to psygames-web
        working-directory: psygames-web-target
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          if git diff --cached --quiet; then
            echo "No changes — psygames-web already up to date"
            exit 0
          fi
          git commit -m "Auto-deploy from psygames-native@${{ github.sha }} (run ${{ github.run_id }}, event ${{ github.event_name }})"
          git push

  # ─── Create GitHub Release if tagged (vX.Y.Z) ─────────────────────────
  release:
    needs: [macos-arm, windows-x64, android, typecheck, smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: artifacts/
      - name: Show artifacts
        run: find artifacts -type f

      # v1.17.0: собрать latest.json для Tauri-updater (desktop: mac arm64 + win x64).
      # .sig — содержимое подписи Tauri-updater (single-line base64). URL'ы ведут
      # на ассеты ЭТОГО релиза; endpoint в приложении — releases/latest/download/latest.json.
      - name: Generate latest.json (Tauri updater manifest)
        run: |
          set -e
          TAG="${GITHUB_REF_NAME}"
          VER="${TAG#v}"
          BASE="https://github.com/donosov999-ai/psygames-native/releases/download/${TAG}"
          MAC_SIG_FILE="artifacts/PsyGames-macos-updater/PsyGames.app.tar.gz.sig"
          # версионные имена — НЕ head -1: кэш CI может оставить .exe прошлой версии
          WIN_EXE="PsyGames_${VER}_x64-setup.exe"
          WIN_EXE_PATH="artifacts/PsyGames-windows-x64-exe/${WIN_EXE}"
          WIN_SIG_FILE="artifacts/PsyGames-windows-updater-sig/${WIN_EXE}.sig"
          PLATFORMS=""
          if [ -f "$MAC_SIG_FILE" ]; then
            MAC_SIG=$(tr -d '\n\r' < "$MAC_SIG_FILE")
            PLATFORMS="\"darwin-aarch64\":{\"signature\":\"${MAC_SIG}\",\"url\":\"${BASE}/PsyGames.app.tar.gz\"}"
          else
            echo "WARN: mac updater .sig not found — darwin omitted from latest.json"
          fi
          if [ -f "$WIN_SIG_FILE" ] && [ -f "$WIN_EXE_PATH" ]; then
            WIN_SIG=$(tr -d '\n\r' < "$WIN_SIG_FILE")
            [ -n "$PLATFORMS" ] && PLATFORMS="${PLATFORMS},"
            PLATFORMS="${PLATFORMS}\"windows-x86_64\":{\"signature\":\"${WIN_SIG}\",\"url\":\"${BASE}/${WIN_EXE}\"}"
          else
            echo "WARN: win updater .sig/.exe not found — windows omitted from latest.json"
          fi
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          printf '{\n  "version": "%s",\n  "pub_date": "%s",\n  "platforms": {%s}\n}\n' "$VER" "$PUB_DATE" "$PLATFORMS" > latest.json
          echo "--- latest.json ---"
          cat latest.json

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: |
            artifacts/PsyGames-macos-arm64/PsyGames-macos-arm64.tar.gz
            artifacts/PsyGames-macos-updater/PsyGames.app.tar.gz
            artifacts/PsyGames-windows-x64-exe/*.exe
            artifacts/PsyGames-windows-x64-msi/*.msi
            artifacts/PsyGames-android-apk/PsyGames-android.apk
            artifacts/PsyGames-android-aab/PsyGames-android.aab
            latest.json
          generate_release_notes: true

      # Sync release binaries → Contabo psy-games.pro/downloads/ под СТАБИЛЬНЫМИ
      # именами (кнопки на download/ постоянны). continue-on-error: GitHub Release —
      # источник истины; если Contabo SFTP флапнул — фолбэк ./deploy-downloads.sh.
      - name: Sync binaries to Contabo /downloads
        continue-on-error: true
        env:
          CONTABO_SSH_HOST: ${{ secrets.CONTABO_SSH_HOST }}
          CONTABO_SSH_USER: ${{ secrets.CONTABO_SSH_USER }}
          CONTABO_SSH_PASS: ${{ secrets.CONTABO_SSH_PASS }}
          CONTABO_REMOTE_DIR: ${{ secrets.CONTABO_REMOTE_DIR }}
        run: |
          set -e
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          mkdir -p dl
          cp artifacts/PsyGames-macos-arm64/PsyGames-macos-arm64.tar.gz dl/
          cp artifacts/PsyGames-android-apk/PsyGames-android.apk dl/
          cp artifacts/PsyGames-windows-x64-exe/*-setup.exe dl/PsyGames-windows-x64-setup.exe
          cp artifacts/PsyGames-windows-x64-msi/*.msi dl/PsyGames-windows-x64.msi || true
          echo "--- uploading to /downloads ---"; ls -lh dl/
          lftp -u "$CONTABO_SSH_USER","$CONTABO_SSH_PASS" "sftp://$CONTABO_SSH_HOST" -e "
            set sftp:auto-confirm yes; set net:timeout 60; set net:max-retries 3; set net:connection-limit 1;
            mkdir -f $CONTABO_REMOTE_DIR/downloads;
            mirror -R --no-perms dl/ $CONTABO_REMOTE_DIR/downloads/;
            bye"
          echo "✓ synced → https://psy-games.pro/downloads/"

      # Поднять номер версии в version.json — бейдж на /download читает его через
      # fetch (Astro-источник: версия не вшита в HTML). Один файл вместо 7 страниц.
      - name: Bump version.json on Contabo
        continue-on-error: true
        env:
          CONTABO_SSH_HOST: ${{ secrets.CONTABO_SSH_HOST }}
          CONTABO_SSH_USER: ${{ secrets.CONTABO_SSH_USER }}
          CONTABO_SSH_PASS: ${{ secrets.CONTABO_SSH_PASS }}
          CONTABO_REMOTE_DIR: ${{ secrets.CONTABO_REMOTE_DIR }}
        run: |
          set -e
          command -v lftp >/dev/null || { sudo apt-get update -qq && sudo apt-get install -y -qq lftp; }
          VER="${GITHUB_REF_NAME#v}"
          echo "Target version: $VER"
          printf '{ "version": "%s" }\n' "$VER" > version.json
          cat version.json
          lftp -u "$CONTABO_SSH_USER","$CONTABO_SSH_PASS" "sftp://$CONTABO_SSH_HOST" -e "
            set sftp:auto-confirm yes; set net:timeout 60; set net:max-retries 3; set net:connection-limit 1;
            put version.json -o $CONTABO_REMOTE_DIR/version.json;
            bye"
          echo "OK version.json -> $VER (бейдж на /download подхватит через fetch)"

  # ─── Web → Contabo psy-games.pro/play (на тегах) ──────────────────────
  # Билдит web с baseUrl=/play и заливает на Contabo /play по SFTP.
  # Закрывает дырку: /downloads авто (release job), а /play раньше был руками.
  play-deploy:
    name: Web → Contabo /play
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: startsWith(github.ref, 'refs/tags/v')
    continue-on-error: true
    steps:
      - uses: actions/checkout@v6
      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: Build web (baseUrl=/play) — WEB-DEMO
        working-directory: frontend
        env:
          # /play/ на psy-games.pro = ТОЛЬКО ДЕМО (решение Дениса 07.2026) — тот же
          # флаг, что и psygames-web деплой выше. Tauri-джобы без флага (полная версия).
          EXPO_PUBLIC_BUILD_TARGET: web-demo
        run: |
          sed -i 's|"baseUrl": "/psygames-web"|"baseUrl": "/play"|' app.json
          npx expo export -p web
          node scripts/create-web-route-aliases.mjs
          ls -la dist/ | head
      - name: version.json — источник правды для проверки обновлений в приложении
        run: |
          # Приложение (appUpdates.ts) спрашивает https://psy-games.pro/play/version.json;
          # GitHub Releases не годится — репо приватный.
          printf '{"version": "%s"}\n' "${GITHUB_REF_NAME#v}" > frontend/dist/version.json
          cat frontend/dist/version.json

      - name: SFTP dist → Contabo /play
        env:
          CONTABO_SSH_HOST: ${{ secrets.CONTABO_SSH_HOST }}
          CONTABO_SSH_USER: ${{ secrets.CONTABO_SSH_USER }}
          CONTABO_SSH_PASS: ${{ secrets.CONTABO_SSH_PASS }}
          CONTABO_REMOTE_DIR: ${{ secrets.CONTABO_REMOTE_DIR }}
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp
          lftp -u "$CONTABO_SSH_USER","$CONTABO_SSH_PASS" "sftp://$CONTABO_SSH_HOST" -e "
            set sftp:auto-confirm yes; set net:timeout 60; set net:max-retries 3; set net:connection-limit 1;
            mkdir -f $CONTABO_REMOTE_DIR/play;
            mirror -R --delete --no-perms frontend/dist/ $CONTABO_REMOTE_DIR/play/;
            bye"
          echo "✓ /play synced → https://psy-games.pro/play/"

  # Автодеплой в Google Play — job В ТОМ ЖЕ run, что и билд.
  # Прежний путь через workflow_run в deploy-android.yml на тег-пушах не
  # срабатывал вовсе (v1.146: событие не доставлено, run даже не создан) —
  # кросс-workflow триггер хрупок; same-run job этого класса проблем не имеет.
  # deploy-android.yml оставлен только как ручной инструмент (workflow_dispatch).
  google-play:
    name: Android → Google Play (internal+alpha+closed-test1)
    runs-on: ubuntu-latest
    needs: [android, typecheck, smoke]
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - uses: actions/checkout@v4

      - name: Download AAB (same run)
        uses: actions/download-artifact@v4
        with:
          name: PsyGames-android-aab
          path: ./aab

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - run: npm install googleapis

      - name: Upload to Google Play
        env:
          GOOGLE_PLAY_SA_JSON: ${{ secrets.GOOGLE_PLAY_SA_JSON }}
          AAB_PATH: ./aab/PsyGames-android.aab
          VERSION_NAME: ${{ github.ref_name }}
        run: node .github/scripts/deploy_play.js
